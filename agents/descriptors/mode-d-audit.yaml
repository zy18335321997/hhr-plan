interface:
  display_name: "健康审计"
  short_description: "对已有明道云应用做系统级公理合规扫描。输出评分卡、问题清单（按严重度排序）、修复建议。"
  mode: "D"
  category: "audit"
  triggers:
    - "检查这个项目"
    - "审计"
    - "健康度"
    - "合规扫描"
    - "代码质量"
    - "项目体检"
    - "audit"
    - "评分"
  requires:
    - system-prompt.md
    - references/unified-design-spec.md
    - references/tool-dispatch.md
    - agents/verification-orchestrator.md
    - agents/audit-scanner.md
    - references/schemas/agent-verification-output.schema.json
  runtime_requires:
    - project_context.json
    - business-flow-manifest.json
    - _node_data.json
    - dependency_graph.json
    - audit-report.md
    - mode-d-verification-state.json
  instructions: "built-in-skills/mode-d-audit.md"
  tools:
    - scripts/auto_sync.py
    - scripts/build_snapshot.py
    - scripts/generate_node_data.py
    - scripts/rebuild_graph.py
    - scripts/search.py
    - scripts/validate-agent-output.py
    - scripts/verification_merge.py
  produces:
    - 项目快照（project-snapshot.md）
    - 五维度评分卡（公理1-5 逐项得分）
    - 问题清单（severity: high/medium/low）
    - DAG 拓扑图
    - 修复 SOP
  verification:
    schema: "references/schemas/agent-verification-output.schema.json"
    primary: "Agent 3 (audit-scanner: 扫描完整性)"
    command: "python3 scripts/validate-agent-output.py --agent3 <agent3.json> && python3 scripts/verification_merge.py --target <mode-d-verification-state.json> --agent3 <agent3.json> --mode audit"
    gate: "Agent 3 格式或语义失败均阻断；修复设计需显式路由 Mode B"
  pipeline: "3 steps: 扫描准备→五维度扫描→门控验证→输出"
  blocking_steps:
    - "Step 1: 项目数据不可用时停"
    - "Step 3: Agent 3 不通过时补扫后重检"
  references:
    - built-in-skills/mode-d-audit.md
    - agents/audit-scanner.md
    - references/axioms/evidence-matrix.md
