name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile scripts
        run: python3 -m py_compile scripts/*.py
      - name: Run unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'
      - name: Run static and snapshot preflight
        run: |
          python3 scripts/preflight.py tests/fixtures/complex-contract.json
          python3 scripts/live_preflight.py tests/fixtures/complex-contract.json \
            --snapshot-dir tests/fixtures/worksheet-info
