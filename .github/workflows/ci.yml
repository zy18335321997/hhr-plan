name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run preflight
        run: bash scripts/preflight.sh commit

      - name: Run doctor (quiet)
        run: bash scripts/doctor.sh --quiet || true

  ledger:
    name: Coverage Ledger Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify ledger format
        run: python3 scripts/verify-ledger.py

      - name: Verify ledger (strict)
        run: python3 scripts/verify-ledger.py --strict || true

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check all Python scripts compile
        run: |
          errors=0
          for f in scripts/*.py; do
            if ! python3 -m py_compile "$f" 2>/dev/null; then
              echo "SYNTAX ERROR: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "$errors script(s) have syntax errors"
            exit 1
          fi
          echo "All Python scripts pass syntax check"

  platform-verify-selftest:
    name: Platform Verify Self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run verify-platform self-test
        run: |
          cat > /tmp/test_nodes.json << 'EOF'
          {
            "workflows": [{
              "name": "test", "worksheet": "test",
              "trigger": {"typeId": 8},
              "nodes": [
                {"typeId": 0, "actionId": null, "name": "trigger"},
                {"typeId": 6, "actionId": 1, "name": "add", "config": {"rows": 50}},
                {"typeId": 4, "actionId": null, "name": "deprecated"},
                {"typeId": 99, "actionId": null, "name": "invalid"}
              ]
            }]
          }
          EOF
          python3 scripts/verify-platform.py --nodes /tmp/test_nodes.json --quiet || exit 0

  validate-output-selftest:
    name: Validate Output Self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run validate-agent-output self-test
        run: |
          # Create valid Agent 1 output
          cat > /tmp/a1.json << 'EOF'
          {"verdict":"pass","summary":{"total_checks":5,"passed":5,"failed":0,"uncertain":0},
           "sections":{"axiom_compliance":{"result":"pass","violations":[]},
           "timeline":{"result":"pass","violations":[]},
           "naming_and_fields":{"result":"pass","violations":[]},
           "logic":{"result":"pass","violations":[]},
           "signals":{"result":"pass","warnings":[]}},
           "issues":[],"fix_guide":{"easy":[],"medium":[],"hard":[]},"uncertain_items":[]}
          EOF
          python3 scripts/validate-agent-output.py --agent1 /tmp/a1.json --quiet || exit 1

  skill-registry:
    name: Skill Registry Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate skill registry consistency
        run: python3 scripts/skill_discovery.py validate

      - name: Ensure registry file exists and is valid JSON
        run: |
          if ! python3 -c "import json; json.load(open('references/skill-registry.json'))" 2>/dev/null; then
            echo "ERROR: skill-registry.json is missing or invalid"
            exit 1
          fi
          echo "skill-registry.json is valid JSON"

  contract-compat-check:
    name: Contract Compatibility Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cross-validate VALID_TYPE_IDS
        run: python3 scripts/contract_compat.py check-schema

      - name: Validate contract with test data (valid)
        run: |
          cat > /tmp/valid_contract.json << 'CEOF'
          {
            "meta": {"schema_version": "1.0", "project": "test", "mode": "A", "created": "2026-07-16", "axioms_covered": ["公理1"], "confidence": "HIGH"},
            "naming": {"auto_number_prefix": "T", "workflow_verb_prefixes": ["创建"], "worksheet_suffix_format": "子表", "bool_field_prefix": "是否", "field_ordering": ["身份标识"]},
            "sheets": [{"name": "t", "module": "t", "is_hub": true, "fields": [{"name": "n", "type": "Text", "required": true, "unique": false}]}],
            "associations": [],
            "workflows": [{"name": "w", "trigger_sheet": "t", "trigger_type": "button", "node_chain": [{"index": "T0", "node_type": "触发", "type_id": 0, "description": "触发"}]}],
            "gates": {"gate_1_dependency": {"result": "pass", "issues": []}, "gate_2_logic": {"result": "pass", "issues": []}, "gate_3_timing": {"result": "n/a", "issues": []}, "gate_4_fields": {"result": "pass", "issues": []}, "gate_5_platform": {"result": "pass", "issues": []}, "gate_6_reasoning": {"result": "pass", "issues": []}}
          }
          CEOF
          python3 scripts/contract_compat.py validate /tmp/valid_contract.json --quiet || exit 1

      - name: Validate contract with test data (invalid)
        run: |
          cat > /tmp/invalid_contract.json << 'CEOF'
          {"meta": {}, "workflows": [{"node_chain": [{"type_id": 999}]}]}
          CEOF
          python3 scripts/contract_compat.py validate /tmp/invalid_contract.json --quiet && exit 1 || exit 0

  regression-audit:
    name: Regression Audit (Format Check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check golden snapshot format
        run: python3 scripts/regression_test.py --check-format
