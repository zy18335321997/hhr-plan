name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run deterministic preflight
        run: bash scripts/preflight.sh commit

      - name: Run or explicitly skip local environment doctor
        shell: bash
        run: |
          if [[ -d "$HOME/Documents/workflow-output" ]]; then
            bash scripts/doctor.sh --quiet
          else
            echo "::notice title=Doctor skipped::SKIP: $HOME/Documents/workflow-output is unavailable in GitHub Actions"
          fi

  ledger:
    name: Coverage Ledger Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify ledger format
        run: python3 scripts/verify-ledger.py

      - name: Verify ledger strict
        run: python3 scripts/verify-ledger.py --strict

  python-syntax:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check all Python scripts compile
        shell: bash
        run: |
          errors=0
          for file in scripts/*.py; do
            if ! python3 -m py_compile "$file"; then
              echo "SYNTAX ERROR: $file"
              errors=$((errors + 1))
            fi
          done
          if [[ $errors -gt 0 ]]; then
            echo "$errors script(s) have syntax errors"
            exit 1
          fi
          echo "All Python scripts pass syntax check"

  unit-tests:
    name: Standard Library Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run unittest discovery
        run: python3 -m unittest discover -s tests -p 'test_*.py'

  platform-verify-selftest:
    name: Platform Verify Self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Valid platform fixture must pass
        run: python3 scripts/verify-platform.py --lock-file tests/fixtures/valid_execution_lock.json --quiet

      - name: Invalid platform fixture must fail
        shell: bash
        run: |
          if python3 scripts/verify-platform.py --nodes tests/fixtures/invalid-platform-nodes.json --quiet; then
            echo "ERROR: invalid platform fixture unexpectedly passed"
            exit 1
          fi
          echo "Invalid platform fixture failed as expected"

  validate-output-selftest:
    name: Validate Output Self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run built-in Agent output self-test
        run: python3 scripts/validate-agent-output.py --selftest

      - name: Dry-run verification merge with repository fixtures
        run: >-
          python3 scripts/verification_merge.py
          --target tests/fixtures/execution-lock.json
          --agent1 tests/fixtures/agent1-pass.json
          --agent2 tests/fixtures/agent2-pass.json
          --mode design
          --dry-run
          --quiet

  skill-registry:
    name: Skill Registry Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Validate skill registry and referenced paths
        run: python3 scripts/skill_discovery.py validate --strict

      - name: Ensure registry file is valid JSON
        run: >-
          python3 -c
          "import json; json.load(open('references/skill-registry.json', encoding='utf-8'))"

  contract-compat-check:
    name: Contract Pipeline Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cross-validate lock schema
        run: python3 scripts/contract_compat.py check-schema

      - name: Validate repository lock fixture
        run: >-
          python3 scripts/contract_compat.py
          validate-lock tests/fixtures/valid_execution_lock.json
          --quiet

      - name: Convert lock fixture to execution contract
        run: >-
          python3 scripts/lock_to_contract.py
          tests/fixtures/valid_execution_lock.json
          --output "$RUNNER_TEMP/execution_contract.json"

      - name: Validate generated execution contract
        run: >-
          python3 scripts/contract_compat.py
          validate-exec "$RUNNER_TEMP/execution_contract.json"
          --quiet

      - name: Verify derived contract matches committed golden
        run: >-
          python3 -c
          "import json,sys; actual=json.load(open(sys.argv[1])); expected=json.load(open(sys.argv[2])); assert actual == expected"
          "$RUNNER_TEMP/execution_contract.json"
          tests/fixtures/expected_execution_contract.json

  executor-integration:
    name: Bundled Executor Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Compile executor scripts
        run: python3 -m py_compile hap-flow-exec/scripts/*.py

      - name: Run executor tests
        run: >-
          python3 -m unittest discover
          -s hap-flow-exec/tests
          -p 'test_*.py'

      - name: Run executor static and snapshot preflight
        run: |
          python3 hap-flow-exec/scripts/preflight.py \
            hap-flow-exec/tests/fixtures/complex-contract.json
          python3 hap-flow-exec/scripts/live_preflight.py \
            hap-flow-exec/tests/fixtures/complex-contract.json \
            --snapshot-dir hap-flow-exec/tests/fixtures/worksheet-info

  regression-audit:
    name: Regression Fixture Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Check committed snapshot formats
        run: python3 scripts/regression_test.py --check-format

      - name: Compare repository fixture to golden snapshot
        run: >-
          python3 scripts/regression_test.py
          --project ci-minimal
          --fixture-dir tests/fixtures/regression
          --quiet

  whitespace:
    name: Commit Range Whitespace Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reject whitespace errors in pushed or PR commits
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            range="${PR_BASE_SHA}...${HEAD_SHA}"
          elif [[ -n "$PUSH_BEFORE_SHA" && ! "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            range="${PUSH_BEFORE_SHA}..${HEAD_SHA}"
          elif git rev-parse "${HEAD_SHA}^" >/dev/null 2>&1; then
            range="${HEAD_SHA}^..${HEAD_SHA}"
          else
            range="${HEAD_SHA}"
          fi
          echo "Checking whitespace in ${range}"
          git diff --check "$range"
