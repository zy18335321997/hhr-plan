interface:
  display_name: "健康审计"
  short_description: "对已有明道云应用做系统级公理合规扫描。输出评分卡、问题清单（按严重度排序）、修复建议。"
  mode: "D"
  category: "audit"
  triggers:
    - "检查这个项目"
    - "审计"
    - "健康度"
    - "合规扫描"
    - "代码质量"
    - "项目体检"
    - "audit"
    - "评分"
  requires:
    - system-prompt.md
    - 项目 project_context.json
    - 项目 business-flow-manifest.json
    - 项目 _node_data.json
    - 项目 dependency_graph.json
  tools:
    - scripts/auto_sync.py
    - scripts/build_snapshot.py
    - scripts/generate_node_data.py
    - scripts/rebuild_graph.py
    - scripts/search.py
  produces:
    - 项目快照（project-snapshot.md）
    - 五维度评分卡（公理1-5 逐项得分）
    - 问题清单（severity: high/medium/low）
    - DAG 拓扑图
    - 修复 SOP
  verification:
    primary: "Agent 1 + Agent 2 (设计质量)"
    secondary: "Agent 3 (audit-scanner: 扫描完整性)"
    gate: "Agent 3 不通过时补扫; Agent 1/2 不通过时修正"
  pipeline: "3 steps: 扫描准备→五维度扫描→门控验证→输出"
  blocking_steps:
    - "Step 1: 项目数据不可用时停"
    - "Step 3: Agent 3 不通过时补扫后重检"
  references:
    - built-in-skills/mode-d-audit.md
    - agents/audit-scanner.md
    - references/axioms/evidence-matrix.md
